**Step 5 — Deploy on Streamlit Cloud**

1. Go to `share.streamlit.io`
2. Sign in with GitHub
3. Click **New app**
4. Select repository: `rffpla-dashboard`
5. Main file path: `app.py`
6. Click **Deploy**

Wait 3–5 minutes — you'll get a permanent URL!

